<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noblar</title>

    <!-- Tailwind  -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* metallic title effect */
    .metallic {
        font-family: "Playfair Display", serif;
        /* font-weight: 800; */
        /* letter-spacing: 0.1em; */
        /* font-size: clamp(2.75rem, 7vw, 8rem); */
        /* line-height: 0.9; */
        /* background: linear-gradient(180deg, #f3f5f6 0%, #a6a8aa 40%, #6f6f70 60%, #d6d8d9 100%); */
        background: linear-gradient(180deg, #c59c5d 0%, #9f855a 40%, #6c5a3d 60%, #c59c5d 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-transform: uppercase;
        /* text-shadow:
            0 2px 10px rgba(0,0,0,0.7),
            0 1px 0 rgba(255,255,255,0.02); */
        display: inline-block;
    }

    .text-noblar {
        color: #c59c5d;
    }

    /* thin divider line used under subtitle */
    .fancy-line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }

    /* gallery item framing */
    .gallery-item {
        overflow: hidden;
        background: #0b0b0b;
        border: 6px solid rgba(0,0,0,0.6);
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform .8s ease;
    }

    .gallery-item:hover img { transform: scale(1.04); }

    /* small helper to create visually similar spacing to reference */
    .page-pad { max-width: 980px; margin: 0 auto; padding-left: 28px; padding-right: 28px; }

    /* responsive tweaks */
    @media (min-width: 1280px) {
      .page-pad { max-width: 1150px; }
    }
  </style>
</head>
<body class="antialiased bg-black text-white flex flex-col min-h-screen min-w-screen">

    <header class="flex justify-between mx-4 lg:mx-12 mt-4 lg:mt-8">
        <img class="w-8 h-8" src="assets/images/noblar-logo.png" alt="">

        <nav class="flex items-center text-noblar text-2xl">
            <i class="fa-brands fa-facebook mr-4"></i>
            <i class="fa-brands fa-instagram mr-4"></i>
            <i class="fa-brands fa-tiktok"></i>
        </nav>
    </header>

    <section class="mt-10">
        <div class="flex flex-col items-center text-center">
            <h1 class="metallic text-6xl lg:text-9xl font-extrabold tracking-widest">Noblar</h1>

            <span class="uppercase tracking-wider text-2xl text-gray-300">Handcrafted luxury</span>

            <div class="fancy-line mt-6 mx-auto"></div>

            <p class="mt-6 text-sm text-gray-300/80">
                Explore a curated selection of our finest handcrafted products, where creativity meets expression.
            </p>
        </div>
    </section>

    <main class="page-pad mt-14">
        <div class="grid gap-6 grid-cols-1 md:grid-cols-3 lg:grid-cols-4">
        <!-- Repeat the same image with controlled object positions to create varied crops -->
        <div class="gallery-item h-56"><img src="assets/images/noblar.png" alt="" style="object-position: 10% 10%;"></div>
        <div class="gallery-item h-72"><img src="assets/images/noblar.png" alt="" style="object-position: 30% 30%;"></div>
        <div class="gallery-item h-48"><img src="assets/images/noblar.png" alt="" style="object-position: 60% 20%;"></div>
        <div class="gallery-item h-64"><img src="assets/images/noblar.png" alt="" style="object-position: 80% 40%;"></div>

        <div class="gallery-item h-56"><img src="assets/images/noblar.png" alt="" style="object-position: 20% 70%;"></div>
        <div class="gallery-item h-72"><img src="assets/images/noblar.png" alt="" style="object-position: 50% 70%;"></div>
        <div class="gallery-item h-48"><img src="assets/images/noblar.png" alt="" style="object-position: 90% 70%;"></div>
        <div class="gallery-item h-64"><img src="assets/images/noblar.png" alt="" style="object-position: 40% 40%;"></div>
        </div>
    </main>

</body>
</html>
